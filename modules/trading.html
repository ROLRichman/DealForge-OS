<!DOCTYPE html>
<html>
<head>
  <title>RO'Lyfe Trading Desk</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../styles.css">

  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
    }

    .panel {
      background: #141c2f;
      margin: 12px;
      padding: 15px;
      border-radius: 12px;
    }

    select, input, button {
      padding: 10px;
      margin-top: 8px;
      width: 100%;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00ffcc;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>📊 RO'Lyfe Trading Desk</h1>

<div class="panel">
  <h2>⏱ Market Session</h2>
  <p id="session"></p>
</div>

<div class="panel">
  <h2>📈 Market Watch</h2>

  <select id="tickerSelect">
    <option>SPY</option>
    <option>QQQ</option>
    <option>NVDA</option>
    <option>AAPL</option>
    <option>TSLA</option>
  </select>

  <p>Price: <span id="price">--</span></p>
  <p>Trend: <span id="trend">--</span></p>
</div>

<div class="panel">
  <h2>📊 Chart</h2>
  <canvas id="chart"></canvas>
</div>

<div class="panel">
  <h2>⚙️ Options Ladder</h2>

  <select id="strategy">
    <option>Call Buy</option>
    <option>Put Buy</option>
    <option>Call Spread</option>
    <option>Put Spread</option>
    <option>Straddle</option>
  </select>

  <input id="contracts" type="number" placeholder="Contracts" />

  <button onclick="runTrade()">Execute Simulation</button>

  <p id="tradeResult"></p>
</div>

<div class="panel">
  <h2>🧠 Risk Engine</h2>
  <p id="risk"></p>
</div>

<div class="panel">
  <h2>📒 Journal</h2>
  <button onclick="saveTrade()">Save Trade</button>
  <div id="journal"></div>
</div>

<script src="mock-data.js"></script>
<script src="engine.js"></script>
<script src="market.js"></script>
<script src="options-ladder.js"></script>
<script src="risk-engine.js"></script>
<script src="journal.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="charts.js"></script>

</body>
</html>
