<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DealForge OS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="app">

<h1>🏡 DealForge OS</h1>
<p class="sub">Analyze → Package → Sign → Send → Close</p>

<!-- PROPERTY -->
<div class="card">

<input id="address" placeholder="Property Address">

<button onclick="openZillow()">🔎 Zillow</button>
<button onclick="openRedfin()">🔎 Redfin</button>

<input id="arv" placeholder="ARV">
<input id="price" placeholder="Purchase Price">

<button onclick="runDeal()">Analyze Deal</button>

<div id="results"></div>

</div>

<!-- OFFERS -->
<div class="card">
<h2>💰 3 Tier Offers</h2>
<div id="offers"></div>
<div id="overage"></div>
</div>

<!-- QUICK REPAIRS -->
<div class="card">
<h2>🏗️ Quick Repairs</h2>

<input id="roof" placeholder="Roof">
<input id="floor" placeholder="Floor">
<input id="electrical" placeholder="Electrical">
<input id="plumbing" placeholder="Plumbing">

<button onclick="calcQuick()">Calculate</button>

<div id="quickOut"></div>
</div>

<!-- FULL INSPECTION -->
<div class="card">
<h2>🧠 COGO Inspection</h2>

<select id="inspection">
<option value="0">Select Item</option>
<option value="10000">Roofing</option>
<option value="8000">Electrical</option>
<option value="15000">Foundation</option>
<option value="12000">HVAC</option>
<option value="20000">Kitchen</option>
<option value="15000">Bathroom</option>
</select>

<input id="inspectCost" placeholder="Cost">

<button onclick="addInspection()">Add Item</button>

<div id="inspectionList"></div>
<div id="inspectionTotal"></div>

</div>

<!-- SIGNATURE -->
<div class="card">
<h2>✍️ Signature</h2>
<canvas id="sigPad"></canvas>
<button onclick="clearSig()">Clear</button>
</div>

<!-- ACTIONS -->
<div class="card">
<button onclick="downloadPDF()">📊 Export PDF</button>
<button onclick="generateContract()">🧾 Contract</button>
<button onclick="sendOffer()">📤 Send Offer</button>
</div>

<!-- LINKS -->
<div class="card">
<h2>🔗 Funding & Tools</h2>

<a href="https://www.7figurescredit.com/?a_aid=ROLFunding" target="_blank">7Figures</a>
<a href="https://go.mypartner.io/referral-partner/?ref=001Qk00000MkqgTIAR">Corporate Credit</a>
<a href="https://my.americasfundingexperts.com/?id=1820217000190862001">Funding Experts</a>

<a href="https://eligibility.sc.egov.usda.gov/">USDA</a>
<a href="https://www.consumerfinance.gov/">Rural Tool</a>

<a href="https://rootoflyfe.blnsoftware.com/">Your Intake</a>

</div>

</div>

<script src="script.js"></script>
</body>
  </html>
