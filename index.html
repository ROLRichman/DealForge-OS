<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DealForge OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="app">

<h1>🏡 DealForge OS</h1>
<p class="sub">Analyze → Lock → Sign → Send → Close</p>

<div class="card">
<input id="address" placeholder="Property Address">

<div class="links-row">
<button onclick="openZillow()">🔎 Zillow</button>
<button onclick="openRedfin()">🔎 Redfin</button>
<button onclick="openRural()">🌾 Rural</button>
</div>

<input id="arv" placeholder="ARV">
<input id="price" placeholder="Purchase Price">
<input type="date" id="closingDate">

<button onclick="analyzeDeal()">Analyze Deal</button>
</div>

<div class="card" id="results"></div>

<div class="card">
<h3>🏗️ Quick Repairs</h3>

<input id="r1" placeholder="Roof (Heavy)">
<input id="r2" placeholder="Electrical (Medium)">
<input id="r3" placeholder="Plumbing (Medium)">
<input id="r4" placeholder="Interior (Light)">

<button onclick="calcRepairs()">Calculate</button>
<div id="repairOut"></div>
</div>

<div class="card">
<h3>🧠 COGO Inspection</h3>

<select id="cogoItem"></select>
<input id="cogoCost" placeholder="Cost">

<button onclick="addCogo()">Add Item</button>
<div id="cogoList"></div>
</div>

<div class="card">
<h3>✍️ Signature</h3>
<canvas id="sig"></canvas>
<button onclick="clearSig()">Clear</button>
</div>

<div class="card actions">
<button onclick="generateContract()">🧾 Purchase Agreement</button>
<button onclick="brokerAgreement()">📑 Broker Agreement</button>
<button onclick="preApp()">🏦 Pre Application</button>
<button onclick="oneClickClose()">🚀 ONE CLICK CLOSE</button>
</div>

<div class="card links">
<h3>🔗 Funding & Tools</h3>

<a href="https://www.7figurescredit.com/?a_aid=ROLFunding" target="_blank">7Figures</a>
<a href="https://go.mypartner.io/referral-partner/?ref=001Qk00000MkqgTIAR" target="_blank">Corporate Credit</a>
<a href="https://my.americasfundingexperts.com/?id=1820217000190862001" target="_blank">Funding Experts</a>
<a href="https://eligibility.sc.egov.usda.gov/" target="_blank">USDA Rural</a>
<a href="https://rootoflyfe.blnsoftware.com/" target="_blank">Your Intake</a>

</div>

</div>

<script src="script.js"></script>
</body>
  </html>
