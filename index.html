<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DealForge OS</title>
<link rel="stylesheet" href="styles.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="app">

<h1>🏡 DealForge OS</h1>

<p class="sub">
Investor-grade deal analysis. Enter numbers → get offers instantly.
</p>

<!-- INPUTS -->
<div class="card">

<input type="number" id="arv" placeholder="ARV (After Repair Value)">
<input type="number" id="price" placeholder="Purchase Price">

<select id="rehab">
<option value="25000">Light Rehab ($25K)</option>
<option value="50000">Medium Rehab ($50K)</option>
<option value="100000">Heavy Rehab ($100K)</option>
<option value="150000">Full Gut ($150K)</option>
</select>

<input type="number" id="fee" value="15000" placeholder="Assignment Fee">
<input type="number" id="months" value="6" placeholder="Holding Months">

<button onclick="analyzeDeal()">Analyze Deal</button>

</div>

<!-- RESULTS -->
<div class="card" id="results"></div>

<!-- ACTIONS -->
  <div class="card actions">

<button onclick="sendEmail()">📧 Send to Email</button>
<button onclick="downloadPDF()">📊 Download Report</button>
<button onclick="generateContract()">🧾 Generate Contract</button>

  </div>
<div class="card actions">

<button onclick="sendEmail()">📧 Send to Email</button>
<button onclick="downloadPDF()">📊 Download Report</button>

</div>
  

<!-- CONTRACT HUB -->
<div class="card">

<h3>📄 Contracts</h3>

<a href="docs/purchase-agreement.pdf" download><button>Purchase Agreement</button></a>
<a href="docs/assignment-contract.pdf" download><button>Assignment Contract</button></a>
<a href="docs/realtor-offer.pdf" download><button>Realtor Offer</button></a>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
