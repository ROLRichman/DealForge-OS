<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DealForge OS - Closing System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="app">

<h1>🏡 DealForge OS</h1>
<p class="sub">Analyze → Offer → Contract → Close</p>

<div class="card">

<input id="address" placeholder="Property Address">
<input id="arv" placeholder="ARV">
<input id="price" placeholder="Purchase Price">

<input id="months" value="6" placeholder="Months Holding">

<button onclick="runDeal()">Analyze Deal</button>

<div id="results"></div>

</div>

<!-- 3 TIER OFFERS -->
<div class="card">
<h2>💰 3-Tier Offers</h2>

<div id="offers"></div>

</div>

<!-- SIGNATURE -->
<div class="card">
<h2>✍️ Sign Deal</h2>
<canvas id="sigPad"></canvas>
<button onclick="clearSig()">Clear</button>
</div>

<!-- ACTIONS -->
<div class="card">

<button onclick="generateContract()">🧾 Generate Full Contract</button>
<button onclick="sendOffer()">📤 Send Offer (SendFuse)</button>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
