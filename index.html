<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealForge OS</title>

  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="app">

  <h1>🏡 DealForge OS</h1>
  <p class="sub">Analyze → Lock → Sign → Send → Close</p>

  <!-- DEAL INPUT -->
  <div class="card">
    <input id="address" placeholder="Property Address" />

    <div class="links-row">
      <button onclick="openZillow()">Zillow</button>
      <button onclick="openRedfin()">Redfin</button>
      <button onclick="openRural()">USDA</button>
    </div>

    <input id="arv" placeholder="ARV" />
    <input id="price" placeholder="Purchase Price" />
    <input type="date" id="closingDate" />

    <button onclick="analyzeDeal()">Analyze Deal</button>
    <button onclick="resetDeal()">♻️ Reset Deal</button>
  </div>

  <!-- DEAL RESULT -->
  <div class="card" id="dealResult">
    <h3>💰 Deal Analysis</h3>
    Ready for your next monster deal.
  </div>

  <!-- 3 TIER -->
  <div class="card">
    <h3>📊 3 Tier Deal Engine</h3>
    <input id="tierArv" placeholder="Enter ARV" />
    <button onclick="run3Tier()">Run 3 Tier</button>
    <div id="tierResults"></div>
  </div>

  <!-- QUICK REPAIRS -->
  <div class="card">
    <h3>🏗️ Quick Repairs</h3>
    <input id="r1" placeholder="Roof" />
    <input id="r2" placeholder="Electrical" />
    <input id="r3" placeholder="Plumbing" />
    <input id="r4" placeholder="Interior" />

    <button onclick="calcRepairs()">Calculate</button>
    <div id="repairOut"></div>
  </div>

  <!-- COGO -->
  <div class="card">
    <h3>🧠 COGO Inspection</h3>

    <select id="cogoItem"></select>
    <input id="cogoCost" placeholder="Cost" />

    <button onclick="addCogo()">Add Item</button>

    <div id="cogoTotal"></div>
    <div id="cogoList"></div>
  </div>

  <!-- SIGNATURE -->
  <div class="card">
    <h3>✍️ Signature</h3>
    <canvas id="sig"></canvas>
    <button onclick="clearSig()">Clear</button>
  </div>

  <!-- ACTIONS -->
  <div class="card actions">
    <button onclick="generatePDF()">🧾 Generate PDF</button>
    <button onclick="sendEmail()">📧 Email Deal</button>
    <button onclick="sendText()">📲 Text Deal</button>
    <button onclick="oneClickClose()">🚀 ONE CLICK CLOSE</button>
  </div>

  <!-- CONTRACTS -->
  <div class="card">
    <h3>🧾 Contracts (Zoho)</h3>
    <div class="btn-grid">
      <a target="_blank" href="https://workdrive.zohopublic.com/writer/open/fyrribde87c7f276547e2a24006e30176378b">Purchase</a>
      <a target="_blank" href="https://workdrive.zohopublic.com/writer/open/fyrri3c23f1670f1d414097c5b25b69dda0df">Assignment</a>
      <a target="_blank" href="https://workdrive.zohopublic.com/writer/open/fyrriec767d07079245a89aa82700dc3a7716">Broker</a>
      <a target="_blank" href="https://workdrive.zohopublic.com/writer/open/fyrri128659b62a8b48fd8df8f6446694a2bb">Pre-App</a>
      <a target="_blank" href="https://workdrive.zohopublic.com/writer/open/fyrri9e256390ea704770ba02f1add8d58885">Realtor</a>
      <a target="_blank" href="https://workdrive.zohopublic.com/writer/open/fyrrie51b06a70b43457db8a652da3fed3e58">Disclosure</a>
    </div>
  </div>

  <!-- JOTFORM -->
  <div class="card">
    <h3>🧾 Dropbox Quick Intake</h3>
    <iframe src="https://form.jotform.com/253154859148062"></iframe>
  </div>

  <div class="card">
    <h3>📋 Main Intake Form</h3>
    <iframe src="https://form.jotform.com/252063354378055"></iframe>
  </div>

  <div class="card">
    <button onclick="window.open('https://agent.jotform.com/019481997fbe793382f010b5f7f063eea634','_blank')">
      🤖 Open AI Agent
    </button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
