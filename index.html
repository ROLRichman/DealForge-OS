<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO’Lyfe Deal OS</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
<div class="app">

<h1>🔥 RO’Lyfe Deal OS</h1>

<!-- PROPERTY -->
<div class="card">
<h3>🏡 Property</h3>
<input id="address" placeholder="Address">
<input id="arv" placeholder="ARV">
<input id="price" placeholder="Purchase Price">
<input id="repairs" placeholder="Repairs">
<input id="assignment" placeholder="Assignment Fee">

<div class="links-row">
<button onclick="openZillow()">Zillow</button>
<button onclick="openRedfin()">Redfin</button>
</div>

<button onclick="analyzeDeal()">Analyze Deal</button>
<div id="dealResult"></div>
</div>

<!-- 3 TIER -->
<div class="card">
<h3>📊 3 Tier Offers</h3>
<input id="tierArv" placeholder="ARV">
<button onclick="run3Tier()">Run Offers</button>
<div id="tierResults"></div>
</div>

<!-- PIPELINE -->
<div class="card">
<h3>📂 Deal Pipeline</h3>
<button onclick="saveDeal()">Save Deal</button>
<div id="pipeline"></div>
</div>

<!-- CLOSE SYSTEM -->
<div class="card">
<h3>🚀 Close Deal</h3>

<div class="btn-grid">
<a href="https://rolrichman.github.io/DealForge-OS/" target="_blank">🏗️ DealForge</a>
<a href="https://rolrichman.github.io/rolyfe-contract-documents-hub/" target="_blank">📄 Contracts</a>
<a href="https://workdrive.zohoexternal.com/file/g6vcbdaba9ad8d815404a873a060254fe1bfc" target="_blank">🏦 Funding</a>
<a href="https://rolrichman.github.io/RO-Lyfe-Buyer-Network-OS/" target="_blank">👥 Buyers</a>
</div>

<button onclick="oneClickClose()">🔥 One Click Close</button>

</div>

<!-- JAMAL -->
<div class="card">
<h3>🤖 Jamal AI</h3>
<iframe src="https://www.jotform.com/agent"></iframe>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
