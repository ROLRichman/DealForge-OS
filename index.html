<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DealForge OS - Closing Machine</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="app">

<h1>🏡 DealForge OS</h1>
<p class="sub">Analyze → Package → Sign → Send → Close</p>

<!-- PROPERTY -->
<div class="card">
<h2>Property Analyzer</h2>

<input id="address" placeholder="Property Address">
<input id="arv" placeholder="ARV">
<input id="price" placeholder="Purchase Price">

<button onclick="runDeal()">Analyze Deal</button>

<div id="results"></div>
</div>

<!-- OFFERS -->
<div class="card">
<h2>💰 3 Tier Offers</h2>
<div id="offers"></div>
</div>

<!-- REPAIRS -->
<div class="card">
<h2>🏗️ Repairs</h2>

<input id="repairs" placeholder="Total Rehab ($)">
<button onclick="calcRepairs()">Calculate</button>

<div id="repairOut"></div>
</div>

<!-- SIGN -->
<div class="card">
<h2>✍️ Signature</h2>
<canvas id="sigPad"></canvas>
<button onclick="clearSig()">Clear Signature</button>
</div>

<!-- ACTIONS -->
<div class="card">
<button onclick="downloadPDF()">📊 Export Deal PDF</button>
<button onclick="generateContract()">🧾 Contract</button>
<button onclick="sendOffer()">📤 Send Offer</button>
</div>

<!-- LINKS -->

<a href="https://form.jotform.com/2530967310210469" target="_blank">Funding App</a>
<a href="https://form.jotform.com/253154859148062" target="_blank">Upload Docs</a>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
