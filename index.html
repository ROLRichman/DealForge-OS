<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DealForge OS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="app">

<h1>🏡 DealForge OS</h1>
<p class="sub">Analyze → Package → Sign → Send → Close</p>

<!-- PROPERTY -->
<div class="card">

<input id="address" value="5503 West Blvd, Youngstown, OH 44512">

<div class="flex">
<button onclick="openZillow()">🔎 Zillow</button>
<button onclick="openRedfin()">🔎 Redfin</button>
</div>

<input id="arv" value="350000">
<input id="price" value="140000">

<button onclick="runDeal()">Analyze Deal</button>

<div id="results"></div>

</div>

<!-- OFFERS -->
<div class="card">
<h2>💰 3 Tier Offers</h2>
<div id="offers"></div>
</div>

<!-- QUICK REPAIR -->
<div class="card">
<h2>🏗️ Quick Repairs</h2>

<input id="roof" value="10000">
<input id="floor" value="10000">
<input id="electrical" value="10000">
<input id="plumbing" value="10000">

<button onclick="calcQuick()">Calculate</button>

<div id="quickOut"></div>
</div>

<!-- INSPECTION -->
<div class="card">
<h2>🧠 COGO Inspection</h2>

<select id="inspection">
<option>Roofing</option>
<option>Electrical</option>
<option>Plumbing</option>
<option>HVAC</option>
<option>Foundation</option>
<option>Kitchen</option>
<option>Bathroom</option>
<option>Flooring</option>
<option>Framing</option>
<option>Windows</option>
<option>Doors</option>
<option>Drywall</option>
<option>Paint</option>
<option>Exterior</option>
<option>Landscaping</option>
<option>Demolition</option>
</select>

<input id="inspectCost" placeholder="Cost">

<button onclick="addInspection()">Add Item</button>

<div id="inspectionList"></div>
<div id="inspectionTotal"></div>

</div>

<!-- SIGN -->
<div class="card">
<h2>✍️ Signature</h2>
<canvas id="sigPad"></canvas>
<button onclick="clearSig()">Clear</button>
</div>

<!-- ACTIONS -->
<div class="card">
<button onclick="downloadPDF()">📊 Export PDF</button>
<button onclick="generateContract()">🧾 Contract</button>
<button onclick="sendOffer()">📤 Send Offer</button>
</div>

<!-- LINKS -->
<div class="card links">
<h2>🔗 Funding & Tools</h2>

<a href="https://www.7figurescredit.com/?a_aid=ROLFunding">7Figures Credit</a>
<a href="https://go.mypartner.io/referral-partner/?ref=001Qk00000MkqgTIAR">Corporate Credit</a>
<a href="https://my.americasfundingexperts.com/?id=1820217000190862001">Funding Experts</a>

<a href="https://getyourbizloan.io/lp1?pu=recqKxJNkvD70xMqi">Loan LP1</a>
<a href="https://getyourbizloan.io/lp2?pu=recqKxJNkvD70xMqi">Loan LP2</a>

<a href="https://form.jotform.com/2530967310210469">Funding App</a>
<a href="https://form.jotform.com/253154859148062">Upload Docs</a>

<a href="https://rootoflyfe.blnsoftware.com/">Your Intake</a>

<a href="https://eligibility.sc.egov.usda.gov/">USDA</a>
<a href="https://www.consumerfinance.gov/">Rural Tool</a>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
