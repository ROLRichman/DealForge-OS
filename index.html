<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DealForge OS - Closing Mode</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

</head>

<body>

<div class="app">

<h1>🏡 DealForge OS</h1>
<p class="sub">Analyze → Package → Send → Close</p>

<!-- INPUTS -->
<div class="card">

<input type="number" id="arv" placeholder="ARV">
<input type="number" id="price" placeholder="Purchase Price">

<select id="rehab">
<option value="25000">Light ($25K)</option>
<option value="50000">Medium ($50K)</option>
<option value="100000">Heavy ($100K)</option>
<option value="150000">Full Gut ($150K)</option>
</select>

<input type="number" id="fee" value="15000">
<input type="number" id="months" value="6">

<button onclick="analyzeDeal()">Analyze Deal</button>

</div>

<!-- RESULTS -->
<div class="card" id="results"></div>

<!-- CONTACT PRELOAD -->
<div class="card">
<h3>📇 Deal Contacts</h3>

<input id="contractor" value="RJ Construction">
<input id="lender" value="Cogo Capital">
<input id="email" value="richman@rootoflyfe.com">

</div>

<!-- SIGNATURE -->
<div class="card">
<h3>✍️ Signature</h3>
<canvas id="sigPad"></canvas>
<button onclick="clearSig()">Clear Signature</button>
</div>

<!-- ACTIONS -->
<div class="card actions">

<h3>⚡ Execute</h3>

<button onclick="downloadPDF()">📊 Deal Report</button>

<button onclick="fillPDF('purchase')">🧾 Purchase PDF</button>
<button onclick="fillPDF('assignment')">📑 Assignment PDF</button>
<button onclick="fillPDF('realtor')">🏡 Realtor PDF</button>

<button onclick="sendDeal()">📧 Send Deal</button>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
